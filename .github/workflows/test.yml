name: Build and Upload .deb Package

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up .NET
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '8.0'

    - name: Restore dependencies
      run: dotnet restore ./str/ClipFlow/ClipFlow.csproj

    - name: Publish .NET Project (self-contained)
      run: |
        dotnet publish "./str/ClipFlow/ClipFlow.csproj" \
          --verbosity quiet \
          --nologo \
          --configuration Release \
          --self-contained true \
          --runtime linux-x64 \
          --output "./out/linux-x64"

    - name: Prepare Debian Package Structure
      run: |
        # Create staging folder
        mkdir staging_folder

        # Create DEBIAN control file
        mkdir ./staging_folder/DEBIAN
        echo "Package: ClipFlow" > ./staging_folder/DEBIAN/control
        echo "Version: 1.0.0" >> ./staging_folder/DEBIAN/control
        echo "Architecture: amd64" >> ./staging_folder/DEBIAN/control
        echo "Maintainer: Your Name <your.email@example.com>" >> ./staging_folder/DEBIAN/control
        echo "Description: ClipFlow is a clipboard synchronization tool." >> ./staging_folder/DEBIAN/control


        # Copy published files
        mkdir ./staging_folder/usr/lib
        mkdir ./staging_folder/usr/lib/clipflow
        cp -f -a ./out/linux-x64/. ./staging_folder/usr/lib/clipflow/
        chmod -R a+rX ./staging_folder/usr/lib/clipflow/ # Set read permissions for all files
        chmod +x ./staging_folder/usr/lib/clipflow/ClipFlow # Set execute permission for the main executable

        # Create desktop entry
        mkdir ./staging_folder/usr/share
        mkdir ./staging_folder/usr/share/applications
        cp ./src/MyProgram.Desktop.Debian/ClipFlow.desktop ./staging_folder/usr/share/applications/ClipFlow.desktop

        # Copy desktop icon
        mkdir ./staging_folder/usr/share/pixmaps
        cp ./build/logo.png ./staging_folder/usr/share/pixmaps/clipflow.png

        # Copy hicolor icon
        mkdir ./staging_folder/usr/share/icons
        mkdir ./staging_folder/usr/share/icons/hicolor
        mkdir ./staging_folder/usr/share/icons/hicolor/scalable
        mkdir ./staging_folder/usr/share/icons/hicolor/scalable/apps
        cp ./build/logo.png ./staging_folder/usr/share/icons/hicolor/scalable/apps/clipflow.png

    - name: Build .deb Package
      run: |
        dpkg-deb --root-owner-group --build ./staging_folder/ ./ClipFlow_1.0.0_amd64.deb

    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: "https://uploads.github.com/repos/leleji/ClipFlow/releases/196777300/assets{?name,label}"
        asset_path: "./ClipFlow_1.0.0_amd64.deb"
        asset_name: "ClipFlow_1.0.0_amd64.deb"
        asset_content_type: application/octet-stream
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
