name: build-linux

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      upload_url:
        required: true
        type: string

jobs:
  build-and-package:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        config:
          - { arch: x64, build_type: self-contained, package_type: AppImage, extension: .AppImage }
          - { arch: x64, build_type: self-contained, package_type: rpm, extension: .rpm }
          - { arch: x64, build_type: self-contained, package_type: deb, extension: .deb }
          - { arch: x64, build_type: no-self-contained, package_type: AppImage, extension: .AppImage }
          - { arch: x64, build_type: no-self-contained, package_type: rpm, extension: .rpm }
          - { arch: x64, build_type: no-self-contained, package_type: deb, extension: .deb }
          - { arch: arm64, build_type: self-contained, package_type: AppImage, extension: .AppImage }
          - { arch: arm64, build_type: self-contained, package_type: deb, extension: .deb }
          - { arch: arm64, build_type: no-self-contained, package_type: AppImage, extension: .AppImage }
          - { arch: arm64, build_type: no-self-contained, package_type: deb, extension: .deb }

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore ./str/ClipFlow/ClipFlow.csproj

    - name: Build and Publish
      run: |
        echo "Building for linux-${{ matrix.config.arch }} with ${{ matrix.config.build_type }}..."
        dotnet publish ./str/ClipFlow/ClipFlow.csproj \
          -c Release \
          -r linux-${{ matrix.config.arch }} \
          --${{ matrix.config.build_type }} \
          -o output/${{ matrix.config.arch }}/${{ matrix.config.build_type }}/${{ matrix.config.package_type }}
        echo "Publish directory contents:"
        ls -lR output/${{ matrix.config.arch }}/${{ matrix.config.build_type }}/${{ matrix.config.package_type }}
        mv output/${{ matrix.config.arch }}/${{ matrix.config.build_type }}/${{ matrix.config.package_type }}/ClipFlow \
           output/ClipFlow-${{ inputs.version }}-${{ matrix.config.build_type }}-${{ matrix.config.arch }}${{ matrix.config.extension }}

    - name: Upload to Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ inputs.upload_url }}
        asset_path: output/ClipFlow-${{ inputs.version }}-${{ matrix.config.build_type }}-${{ matrix.config.arch }}${{ matrix.config.extension }}
        asset_name: ClipFlow-${{ inputs.version }}-${{ matrix.config.build_type }}-${{ matrix.config.arch }}${{ matrix.config.extension }}
        asset_content_type: application/octet-stream
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
